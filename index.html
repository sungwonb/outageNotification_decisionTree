<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility Outage Architecture Decision Tree</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f6f7f9;
            --surface: #ffffff;
            --border: #e3e6ea;
            --text: #1a1d21;
            --text-muted: #5c6370;
            --accent: #0d6e6e;
            --accent-light: #e6f2f2;
            --decision: #2d5a8b;
            --decision-bg: #eef4fb;
            --outcome: #1a7f37;
            --outcome-bg: #e8f5ec;
            --shadow: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.08);
            --space-xs: 0.25rem;   /* 4px */
            --space-sm: 0.5rem;    /* 8px */
            --space-md: 1rem;      /* 16px */
            --space-lg: 1.5rem;    /* 24px */
            --space-xl: 2rem;      /* 32px */
            --space-2xl: 2.5rem;  /* 40px */
            --space-3xl: 3rem;     /* 48px */
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            max-width: 1240px;
            margin: 0 auto;
            padding: var(--space-3xl) var(--space-xl);
        }

        header {
            margin-bottom: var(--space-2xl);
            padding-bottom: var(--space-xl);
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 var(--space-xs) 0;
            letter-spacing: -0.02em;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 0.9375rem;
            color: var(--text-muted);
            margin: 0;
            max-width: 36em;
        }

        #tree-wrapper {
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: var(--space-2xl);
            margin-bottom: var(--space-2xl);
            overflow: auto;
        }

        #tree-container {
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #tree-container svg {
            display: block;
            overflow: visible;
        }

        .node circle {
            stroke-width: 2.5px;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .node:hover circle {
            filter: brightness(0.97);
            transform: scale(1.08);
        }

        .node--root circle { fill: var(--accent-light); stroke: var(--accent); }
        .node--internal circle { fill: var(--decision-bg); stroke: var(--decision); }
        .node--leaf circle { fill: var(--outcome-bg); stroke: var(--outcome); }

        .node text {
            font: 500 13px 'DM Sans', sans-serif;
            fill: var(--text);
            letter-spacing: 0.01em;
        }

        .node--root text { font-weight: 700; fill: var(--accent); font-size: 14px; }
        .node--leaf text { fill: var(--outcome); font-weight: 500; }

        .link {
            fill: none;
            stroke: var(--border);
            stroke-width: 1.5px;
            opacity: 0.85;
        }

        #tooltip {
            position: fixed;
            padding: var(--space-md) var(--space-lg);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            pointer-events: none;
            opacity: 0;
            box-shadow: var(--shadow-hover);
            max-width: 300px;
            font-size: 0.8125rem;
            color: var(--text);
            line-height: 1.5;
            z-index: 1000;
            transition: opacity 0.12s ease, transform 0.12s ease;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-lg) var(--space-xl);
            align-items: center;
            font-size: 0.8125rem;
            color: var(--text-muted);
            padding-top: var(--space-md);
            border-top: 1px solid var(--border);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid;
            flex-shrink: 0;
        }

        .legend-dot--root { background: var(--accent-light); border-color: var(--accent); }
        .legend-dot--decision { background: var(--decision-bg); border-color: var(--decision); }
        .legend-dot--outcome { background: var(--outcome-bg); border-color: var(--outcome); }
    </style>
</head>
<body>

<div class="page">
    <header>
        <h1>Utility Outage Notification: Architectural Decision Tree</h1>
        <p class="subtitle">Choose the right Salesforce architecture pattern based on outage type and data flow.</p>
    </header>

    <div id="tree-wrapper">
        <div id="tree-container"></div>
    </div>

    <div id="tooltip"></div>

    <div class="legend">
        <span class="legend-item"><span class="legend-dot legend-dot--root"></span> Start / trigger</span>
        <span class="legend-item"><span class="legend-dot legend-dot--decision"></span> Decision point</span>
        <span class="legend-item"><span class="legend-dot legend-dot--outcome"></span> Recommended pattern</span>
        <span style="color: var(--border); font-weight: 400;">·</span>
        <span>Hover over a node to see details.</span>
    </div>
</div>

<script>
    function initTree() {
        if (typeof d3 === "undefined") {
            setTimeout(initTree, 50);
            return;
        }
        const container = document.getElementById("tree-container");
        if (!container || container.querySelector("svg")) return;
        const data = {
        "name": "Outage Event Detected",
        "description": "Start here: Grid/OMS triggers a notification event.",
        "children": [
            {
                "name": "Planned Outage?",
                "description": "Is this a scheduled maintenance event for a large area?",
                "children": [
                    { "name": "Broadcast Flow", "description": "BEST FOR: High-volume, non-urgent batching. Low complexity." }
                ]
            },
            {
                "name": "Unplanned (Real-Time)?",
                "description": "Emergency fault requiring immediate notification.",
                "children": [
                    {
                        "name": "Full Data in Payload?",
                        "description": "Does the Grid send the Contact Info + ETR + Cause?",
                        "children": [
                            {
                                "name": "Data Action (Push)",
                                "description": "BEST FOR: Low-code. DC pushes directly to MCE Transactional API."
                            }
                        ]
                    },
                    {
                        "name": "ID-Only Payload?",
                        "description": "Grid only sends Meter ID; Enrichment required via Data Graph.",
                        "children": [
                            {
                                "name": "Need Multi-Step Journey?",
                                "description": "Do you need wait steps or channel branching?",
                                "children": [
                                    { "name": "On-Demand Flow", "description": "BEST FOR: Declarative journeys with cross-object logic." }
                                ]
                            },
                            {
                                "name": "Sub-Second SLA?",
                                "description": "Is extreme speed and storm-burst protection the priority?",
                                "children": [
                                    { "name": "Middleware Pull", "description": "BEST FOR: Extreme scale. Middleware pulls from Data Graph API & pushes to MCE." }
                                ]
                            }
                        ]
                    }
                ]
            }
        ]
    };

    const treeWidth = 1000;
    const treeHeight = 560;
    const baseMargin = { top: 48, right: 160, bottom: 48, left: 48 };

    const svg = d3.select(container).append("svg")
        .attr("viewBox", `0 0 ${treeWidth} ${treeHeight}`)
        .attr("preserveAspectRatio", "xMidYMid meet")
        .attr("width", treeWidth)
        .attr("height", treeHeight)
        .style("max-width", "100%")
        .style("height", "auto")
        .style("overflow", "visible");

    const g = svg.append("g");

    const treeLayout = d3.tree()
        .size([
            treeHeight - baseMargin.top - baseMargin.bottom,
            treeWidth - baseMargin.left - baseMargin.right
        ])
        .separation((a, b) => {
            const sameParent = a.parent === b.parent;
            const depth = a.depth;
            if (depth === 0) return 2.2;
            if (depth === 1) return 1.9;
            if (sameParent) return 1.5;
            return 1.8;
        });

    const root = d3.hierarchy(data);
    treeLayout(root);

    const descendants = root.descendants();
    const minY = Math.min(...descendants.map(d => d.y));
    const maxY = Math.max(...descendants.map(d => d.y));
    const spanY = maxY - minY || 1;

    const leftPadding = 220;
    const rightPadding = 160;
    const scaleX = (treeWidth - leftPadding - rightPadding) / spanY;
    const offsetX = leftPadding - minY * scaleX;

    g.attr("transform", `translate(${offsetX},${baseMargin.top})`);

    const linkGenerator = d3.link(d3.curveMonotoneX)
        .x(d => d.y * scaleX)
        .y(d => d.x);

    g.selectAll(".link")
        .data(root.links())
        .enter().append("path")
        .attr("class", "link")
        .attr("d", linkGenerator);

    const nodeRadius = 10;
    const labelOffset = 16;

    const node = g.selectAll(".node")
        .data(descendants)
        .enter().append("g")
        .attr("class", d => {
            if (!d.parent) return "node node--root";
            if (d.children) return "node node--internal";
            return "node node--leaf";
        })
        .attr("transform", d => `translate(${d.y * scaleX},${d.x})`)
        .on("mouseover", (event, d) => {
            const tooltip = d3.select("#tooltip");
            tooltip.style("opacity", 1)
                .style("transform", "translate(0, -2px)")
                .style("left", (event.pageX + 16) + "px")
                .style("top", (event.pageY - 4) + "px")
                .html(d.data.description);
        })
        .on("mousemove", (event) => {
            d3.select("#tooltip")
                .style("left", (event.pageX + 16) + "px")
                .style("top", (event.pageY - 4) + "px");
        })
        .on("mouseout", () => {
            d3.select("#tooltip")
                .style("opacity", 0)
                .style("transform", "translate(0, 0)");
        });

    node.append("circle").attr("r", nodeRadius);

    node.append("text")
        .attr("dy", ".35em")
        .attr("x", d => {
            if (!d.parent) return labelOffset;
            return d.children ? -labelOffset : labelOffset;
        })
        .style("text-anchor", d => {
            if (!d.parent) return "start";
            return d.children ? "end" : "start";
        })
        .text(d => d.data.name);
    }
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initTree);
    } else {
        initTree();
    }
</script>

</body>
</html>
